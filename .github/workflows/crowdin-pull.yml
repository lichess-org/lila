name: Crowdin Pull

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  download_translations:
    if: github.repository_owner == 'lichess-org' && github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: crowdin action
        uses: crowdin/github-action@v2
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          crowdin_branch_name: '[lichess-org.lila] master'
          upload_sources_args: '--preserve-hierarchy'
          source: translation/source/*.xml
          translation: /translation/dest/%file_name%/%locale%.%file_extension%
          localization_branch_name: l10n_crowdin_translations

          create_pull_request: true
          pull_request_title: 'New Crowdin Translations'
          pull_request_body: 'Help contribute to these translations at https://crowdin.com/project/lichess'
          pull_request_base_branch_name: ${{ github.event.repository.default_branch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
